# Wisdoverse Nexus 生产环境 — docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# 用途：生产部署，包含健康检查、资源限制、日志管理、网络隔离

services:
  nexis-gateway:
    restart: unless-stopped
    ports: ["8080:8080"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - backend
      - frontend

  postgres:
    restart: unless-stopped
    ports: []   # 生产环境不暴露端口，仅内部网络访问
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexis -d nexis"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    volumes:
      - postgres-data:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - backend

  redis:
    restart: unless-stopped
    ports: []   # 生产环境不暴露端口
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 384mb --maxmemory-policy allkeys-lru
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - backend

  prometheus:
    restart: unless-stopped
    ports: ["9090:9090"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    volumes:
      - prometheus-data:/prometheus
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - backend

  grafana:
    restart: unless-stopped
    ports: ["3000:3000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    volumes:
      - grafana-data:/var/lib/grafana
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "5"
    networks:
      - frontend

networks:
  frontend:
    driver: bridge
    internal: false
  backend:
    driver: bridge
    internal: true
