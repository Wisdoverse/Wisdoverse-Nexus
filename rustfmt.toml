# Wisdoverse Nexus Rust 代码格式化配置
# 基于 Rust 官方标准，额外配置以提高代码可读性

# 最大行宽
max_width = 100

# 使用 4 空格缩进
tab_spaces = 4

# 使用空格而非制表符
hard_tabs = false

# 函数参数换行策略
fn_params_layout = "Tall"

# 导入排序
reorder_imports = true

# 链式调用换行
chain_width = 60

# 单行 if-else 表达式最大宽度
single_line_if_else_max_width = 50

# 强制使用 Unix 换行符
newline_style = "Unix"

# 强制使用字段初始简写
use_field_init_shorthand = true

# 强制使用 try! 宏转 ?
use_try_shorthand = false
