<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="#0a0a0a"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="url(#heroGrad)" opacity="0.1" filter="url(#glow)"/>
  <circle cx="500" cy="300" r="100" fill="url(#heroGrad)" opacity="0.1" filter="url(#glow)"/>
  
  <!-- Central hub -->
  <circle cx="300" cy="200" r="60" fill="url(#heroGrad)" filter="url(#glow)"/>
  <text x="300" y="210" text-anchor="middle" fill="white" font-size="32" font-weight="900" font-family="Inter, sans-serif">N</text>
  
  <!-- Connected nodes -->
  <g fill="url(#heroGrad)" opacity="0.8">
    <!-- Top -->
    <circle cx="300" cy="60" r="25"/>
    <!-- Right -->
    <circle cx="480" cy="140" r="25"/>
    <!-- Bottom right -->
    <circle cx="480" cy="260" r="25"/>
    <!-- Bottom -->
    <circle cx="300" cy="340" r="25"/>
    <!-- Bottom left -->
    <circle cx="120" cy="260" r="25"/>
    <!-- Top left -->
    <circle cx="120" cy="140" r="25"/>
  </g>
  
  <!-- Connection lines -->
  <g stroke="url(#heroGrad)" stroke-width="2" opacity="0.4">
    <line x1="300" y1="140" x2="300" y2="85"/>
    <line x1="360" y1="200" x2="455" y2="140"/>
    <line x1="360" y1="200" x2="455" y2="260"/>
    <line x1="300" y1="260" x2="300" y2="315"/>
    <line x1="240" y1="200" x2="145" y2="260"/>
    <line x1="240" y1="200" x2="145" y2="140"/>
  </g>
  
  <!-- Labels -->
  <g fill="white" font-size="10" font-family="Inter, sans-serif" opacity="0.7">
    <text x="300" y="40" text-anchor="middle">Web</text>
    <text x="500" y="135" text-anchor="start">Mobile</text>
    <text x="500" y="265" text-anchor="start">Web App</text>
    <text x="300" y="365" text-anchor="middle">CLI</text>
    <text x="100" y="265" text-anchor="end">API</text>
    <text x="100" y="135" text-anchor="end">SDK</text>
  </g>
  
  <!-- Decorative dots -->
  <g fill="url(#heroGrad)">
    <circle cx="50" cy="50" r="3"/>
    <circle cx="550" cy="50" r="3"/>
    <circle cx="50" cy="350" r="3"/>
    <circle cx="550" cy="350" r="3"/>
  </g>
</svg>
