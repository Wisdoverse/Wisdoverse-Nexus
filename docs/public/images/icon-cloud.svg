<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  
  <!-- Circle background -->
  <circle cx="100" cy="100" r="90" fill="url(#cloudGrad)" opacity="0.1"/>
  
  <!-- Cloud -->
  <g fill="url(#cloudGrad)">
    <circle cx="70" cy="95" r="30"/>
    <circle cx="110" cy="85" r="35"/>
    <circle cx="140" cy="95" r="28"/>
    <rect x="50" y="95" width="110" height="40" rx="10"/>
  </g>
  
  <!-- Kubernetes wheel -->
  <g stroke="white" stroke-width="3" fill="none">
    <circle cx="100" cy="115" r="25"/>
    <line x1="100" y1="90" x2="100" y2="115"/>
    <line x1="115" y1="102" x2="100" y2="115"/>
    <line x1="115" y1="128" x2="100" y2="115"/>
    <line x1="100" y1="140" x2="100" y2="115"/>
    <line x1="85" y1="128" x2="100" y2="115"/>
    <line x1="85" y1="102" x2="100" y2="115"/>
  </g>
</svg>
