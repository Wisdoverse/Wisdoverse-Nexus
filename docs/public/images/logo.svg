<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#logoGrad)" filter="url(#shadow)"/>
  
  <!-- N Letter -->
  <g fill="white">
    <!-- Left vertical bar -->
    <rect x="50" y="50" width="20" height="100" rx="4"/>
    
    <!-- Diagonal -->
    <polygon points="50,50 70,50 150,150 130,150"/>
    
    <!-- Right vertical bar -->
    <rect x="130" y="50" width="20" height="100" rx="4"/>
  </g>
  
  <!-- Connection dots representing real-time collaboration -->
  <circle cx="60" cy="60" r="6" fill="white" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="140" cy="60" r="6" fill="white" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="140" r="6" fill="white" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>
</svg>
