<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.1"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="700" fill="#0a0a0a"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="700" fill="url(#grid)" opacity="0.5"/>
  
  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="url(#brandGrad)" font-size="32" font-weight="800" font-family="Inter, sans-serif">
    Wisdoverse Nexus Architecture
  </text>
  
  <!-- Client Layer -->
  <g filter="url(#shadow)">
    <rect x="100" y="100" width="300" height="120" rx="16" fill="#1a1a2e"/>
    <text x="250" y="130" text-anchor="middle" fill="#818cf8" font-size="18" font-weight="700" font-family="Inter, sans-serif">
      Client Layer
    </text>
    
    <!-- Client boxes -->
    <rect x="120" y="150" width="70" height="50" rx="8" fill="#2a2a4a"/>
    <text x="155" y="180" text-anchor="middle" fill="white" font-size="11" font-family="Inter, sans-serif">Web</text>
    
    <rect x="210" y="150" width="70" height="50" rx="8" fill="#2a2a4a"/>
    <text x="245" y="180" text-anchor="middle" fill="white" font-size="11" font-family="Inter, sans-serif">Mobile</text>
    
    <rect x="300" y="150" width="70" height="50" rx="8" fill="#2a2a4a"/>
    <text x="335" y="180" text-anchor="middle" fill="white" font-size="11" font-family="Inter, sans-serif">SDK / CLI</text>
  </g>
  
  <!-- API Gateway -->
  <g filter="url(#shadow)">
    <rect x="450" y="100" width="300" height="120" rx="16" fill="url(#brandGrad)"/>
    <text x="600" y="140" text-anchor="middle" fill="white" font-size="20" font-weight="800" font-family="Inter, sans-serif">
      API Gateway
    </text>
    <text x="600" y="165" text-anchor="middle" fill="white" font-size="12" opacity="0.9" font-family="Inter, sans-serif">
      Authentication · Rate Limiting · Routing
    </text>
    <text x="600" y="185" text-anchor="middle" fill="white" font-size="11" opacity="0.7" font-family="Inter, sans-serif">
      HTTP and WebSocket Routing
    </text>
  </g>
  
  <!-- Services Layer -->
  <g filter="url(#shadow)">
    <rect x="800" y="100" width="300" height="120" rx="16" fill="#1a1a2e"/>
    <text x="950" y="130" text-anchor="middle" fill="#818cf8" font-size="18" font-weight="700" font-family="Inter, sans-serif">
      Services
    </text>
    
    <rect x="820" y="150" width="80" height="50" rx="8" fill="#2a2a4a"/>
    <text x="860" y="180" text-anchor="middle" fill="white" font-size="11" font-family="Inter, sans-serif">Meeting</text>
    
    <rect x="910" y="150" width="80" height="50" rx="8" fill="#2a2a4a"/>
    <text x="950" y="180" text-anchor="middle" fill="white" font-size="11" font-family="Inter, sans-serif">Context</text>
    
    <rect x="1000" y="150" width="80" height="50" rx="8" fill="#2a2a4a"/>
    <text x="1040" y="180" text-anchor="middle" fill="white" font-size="11" font-family="Inter, sans-serif">Search</text>
  </g>
  
  <!-- Connection lines -->
  <g stroke="#6366f1" stroke-width="3" fill="none" opacity="0.6">
    <path d="M400 160 L450 160" marker-end="url(#arrow)"/>
    <path d="M750 160 L800 160" marker-end="url(#arrow)"/>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6366f1"/>
    </marker>
  </defs>
  
  <!-- Middleware Layer -->
  <g filter="url(#shadow)">
    <rect x="100" y="280" width="500" height="150" rx="16" fill="#1a1a2e"/>
    <text x="350" y="310" text-anchor="middle" fill="#818cf8" font-size="18" font-weight="700" font-family="Inter, sans-serif">
      Middleware Layer
    </text>
    
    <!-- Middleware boxes -->
    <rect x="120" y="330" width="110" height="70" rx="8" fill="#2a2a4a"/>
    <text x="175" y="360" text-anchor="middle" fill="white" font-size="12" font-weight="600" font-family="Inter, sans-serif">JWT Auth</text>
    <text x="175" y="380" text-anchor="middle" fill="#818cf8" font-size="10" font-family="Inter, sans-serif">Authentication</text>
    
    <rect x="250" y="330" width="110" height="70" rx="8" fill="#2a2a4a"/>
    <text x="305" y="360" text-anchor="middle" fill="white" font-size="12" font-weight="600" font-family="Inter, sans-serif">Rate Limiter</text>
    <text x="305" y="380" text-anchor="middle" fill="#818cf8" font-size="10" font-family="Inter, sans-serif">Protection</text>
    
    <rect x="380" y="330" width="110" height="70" rx="8" fill="#2a2a4a"/>
    <text x="435" y="360" text-anchor="middle" fill="white" font-size="12" font-weight="600" font-family="Inter, sans-serif">CORS</text>
    <text x="435" y="380" text-anchor="middle" fill="#818cf8" font-size="10" font-family="Inter, sans-serif">Security</text>
    
    <rect x="510" y="330" width="70" height="70" rx="8" fill="#2a2a4a"/>
    <text x="545" y="370" text-anchor="middle" fill="white" font-size="12" font-weight="600" font-family="Inter, sans-serif">...</text>
  </g>
  
  <!-- Observability Layer -->
  <g filter="url(#shadow)">
    <rect x="650" y="280" width="450" height="150" rx="16" fill="#1a1a2e"/>
    <text x="875" y="310" text-anchor="middle" fill="#818cf8" font-size="18" font-weight="700" font-family="Inter, sans-serif">
      Observability Stack
    </text>
    
    <rect x="670" y="330" width="100" height="70" rx="8" fill="#2a2a4a"/>
    <text x="720" y="360" text-anchor="middle" fill="white" font-size="12" font-weight="600" font-family="Inter, sans-serif">Prometheus</text>
    <text x="720" y="380" text-anchor="middle" fill="#818cf8" font-size="10" font-family="Inter, sans-serif">Metrics</text>
    
    <rect x="790" y="330" width="100" height="70" rx="8" fill="#2a2a4a"/>
    <text x="840" y="360" text-anchor="middle" fill="white" font-size="12" font-weight="600" font-family="Inter, sans-serif">Grafana</text>
    <text x="840" y="380" text-anchor="middle" fill="#818cf8" font-size="10" font-family="Inter, sans-serif">Visualization</text>
    
    <rect x="910" y="330" width="100" height="70" rx="8" fill="#2a2a4a"/>
    <text x="960" y="360" text-anchor="middle" fill="white" font-size="12" font-weight="600" font-family="Inter, sans-serif">OpenTelemetry</text>
    <text x="960" y="380" text-anchor="middle" fill="#818cf8" font-size="10" font-family="Inter, sans-serif">Tracing</text>
    
    <rect x="1030" y="330" width="50" height="70" rx="8" fill="#2a2a4a"/>
    <text x="1055" y="370" text-anchor="middle" fill="white" font-size="12" font-weight="600" font-family="Inter, sans-serif">...</text>
  </g>
  
  <!-- Connection lines -->
  <g stroke="#6366f1" stroke-width="2" fill="none" opacity="0.4" stroke-dasharray="5,5">
    <path d="M600 220 L600 280"/>
    <path d="M350 355 L350 430"/>
    <path d="M875 355 L875 430"/>
  </g>
  
  <!-- Data Layer -->
  <g filter="url(#shadow)">
    <rect x="100" y="480" width="700" height="150" rx="16" fill="#1a1a2e"/>
    <text x="450" y="510" text-anchor="middle" fill="#818cf8" font-size="18" font-weight="700" font-family="Inter, sans-serif">
      Data Layer
    </text>
    
    <rect x="120" y="530" width="130" height="70" rx="8" fill="#2a2a4a"/>
    <text x="185" y="560" text-anchor="middle" fill="white" font-size="12" font-weight="600" font-family="Inter, sans-serif">PostgreSQL</text>
    <text x="185" y="580" text-anchor="middle" fill="#818cf8" font-size="10" font-family="Inter, sans-serif">Persistent Storage</text>
    
    <rect x="270" y="530" width="130" height="70" rx="8" fill="#2a2a4a"/>
    <text x="335" y="560" text-anchor="middle" fill="white" font-size="12" font-weight="600" font-family="Inter, sans-serif">Redis</text>
    <text x="335" y="580" text-anchor="middle" fill="#818cf8" font-size="10" font-family="Inter, sans-serif">Cache Layer</text>
    
    <rect x="420" y="530" width="130" height="70" rx="8" fill="#2a2a4a"/>
    <text x="485" y="560" text-anchor="middle" fill="white" font-size="12" font-weight="600" font-family="Inter, sans-serif">CRDT Store</text>
    <text x="485" y="580" text-anchor="middle" fill="#818cf8" font-size="10" font-family="Inter, sans-serif">Real-time Sync</text>
    
    <rect x="570" y="530" width="130" height="70" rx="8" fill="#2a2a4a"/>
    <text x="635" y="560" text-anchor="middle" fill="white" font-size="12" font-weight="600" font-family="Inter, sans-serif">Vector DB</text>
    <text x="635" y="580" text-anchor="middle" fill="#818cf8" font-size="10" font-family="Inter, sans-serif">Semantic Search</text>
    
    <rect x="720" y="530" width="60" height="70" rx="8" fill="#2a2a4a"/>
    <text x="750" y="570" text-anchor="middle" fill="white" font-size="12" font-weight="600" font-family="Inter, sans-serif">...</text>
  </g>
  
  <!-- External Services -->
  <g filter="url(#shadow)">
    <rect x="850" y="480" width="250" height="150" rx="16" fill="#1a1a2e"/>
    <text x="975" y="510" text-anchor="middle" fill="#818cf8" font-size="18" font-weight="700" font-family="Inter, sans-serif">
      External Services
    </text>
    
    <rect x="870" y="530" width="100" height="70" rx="8" fill="#2a2a4a"/>
    <text x="920" y="560" text-anchor="middle" fill="white" font-size="12" font-weight="600" font-family="Inter, sans-serif">AI Providers</text>
    <text x="920" y="580" text-anchor="middle" fill="#818cf8" font-size="10" font-family="Inter, sans-serif">OpenAI/Claude</text>
    
    <rect x="990" y="530" width="90" height="70" rx="8" fill="#2a2a4a"/>
    <text x="1035" y="560" text-anchor="middle" fill="white" font-size="12" font-weight="600" font-family="Inter, sans-serif">CDN</text>
    <text x="1035" y="580" text-anchor="middle" fill="#818cf8" font-size="10" font-family="Inter, sans-serif">Assets</text>
  </g>
  
  <!-- Stats badges -->
  <g filter="url(#glow)">
    <rect x="100" y="660" width="150" height="30" rx="15" fill="url(#brandGrad)"/>
    <text x="175" y="680" text-anchor="middle" fill="white" font-size="12" font-weight="700" font-family="Inter, sans-serif">
      Container Config
    </text>
    
    <rect x="270" y="660" width="150" height="30" rx="15" fill="url(#brandGrad)"/>
    <text x="345" y="680" text-anchor="middle" fill="white" font-size="12" font-weight="700" font-family="Inter, sans-serif">
      Helm Baseline
    </text>
    
    <rect x="440" y="660" width="150" height="30" rx="15" fill="url(#brandGrad)"/>
    <text x="515" y="680" text-anchor="middle" fill="white" font-size="12" font-weight="700" font-family="Inter, sans-serif">
      Security Headers
    </text>
    
    <rect x="610" y="660" width="150" height="30" rx="15" fill="url(#brandGrad)"/>
    <text x="685" y="680" text-anchor="middle" fill="white" font-size="12" font-weight="700" font-family="Inter, sans-serif">
      Prometheus Metrics
    </text>
  </g>
</svg>
