name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily security scan at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# CodeQL job overrides this with `security-events: write`.
permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  # ============================================================================
  # Secret Scanning
  # ============================================================================
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab  # v3.95.3
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

  # ============================================================================
  # Dependency Audit
  # ============================================================================
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache: 'false'

      - name: Install cargo-audit
        uses: taiki-e/install-action@f7ae479469b4c4fb5c1818615346605e61b5dc27  # cargo-audit

      - name: Run audit
        run: cargo audit --deny warnings

  # ============================================================================
  # Node Dependency Audit
  # ============================================================================
  node-dependency-audit:
    name: Node Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Audit pnpm workspace
        run: pnpm audit --audit-level moderate

      - name: Audit mobile npm lockfile
        working-directory: apps/mobile
        run: npm audit --audit-level=moderate

      - name: Audit docs npm lockfile
        working-directory: docs
        run: npm audit --audit-level=moderate

      - name: Audit web e2e npm lockfile
        working-directory: apps/web/e2e
        run: npm audit --audit-level=moderate

  # ============================================================================
  # CodeQL Analysis (multi-language matrix; advanced config).
  # Default code-scanning setup must remain DISABLED at the repo level for this
  # workflow to succeed. See .github/codeql/codeql-config.yml for query suites
  # and path exclusions.
  # ============================================================================
  codeql:
    name: CodeQL Analysis (${{ matrix.language }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.language == 'rust' && 60 || 30 }}
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
            runner: ubuntu-latest
          - language: javascript-typescript
            build-mode: none
            runner: ubuntu-latest
          - language: python
            build-mode: none
            runner: ubuntu-latest
          - language: rust
            # CodeQL's rust extractor only supports `none` (source-only).
            # Manual / autobuild modes are rejected with
            # "Rust does not support the manual build mode".
            build-mode: none
            runner: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
