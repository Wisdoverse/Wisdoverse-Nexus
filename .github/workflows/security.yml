name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily security scan at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  # ============================================================================
  # Secret Scanning
  # ============================================================================
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3.95.2
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

  # ============================================================================
  # Dependency Audit
  # ============================================================================
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run audit
        run: cargo audit

  # ============================================================================
  # Node Dependency Audit
  # ============================================================================
  node-dependency-audit:
    name: Node Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Audit pnpm workspace
        run: pnpm audit --audit-level moderate

      - name: Audit mobile npm lockfile
        working-directory: apps/mobile
        run: npm audit --audit-level=moderate

      - name: Audit docs npm lockfile
        working-directory: docs
        run: npm audit --audit-level=moderate

      - name: Audit web e2e npm lockfile
        working-directory: apps/web/e2e
        run: npm audit --audit-level=moderate

  # ============================================================================
  # CodeQL Analysis (multi-language matrix; advanced config).
  # Default code-scanning setup must remain DISABLED at the repo level for this
  # workflow to succeed. See .github/codeql/codeql-config.yml for query suites
  # and path exclusions.
  # ============================================================================
  codeql:
    name: CodeQL Analysis (${{ matrix.language }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.language == 'rust' && 60 || 30 }}
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
            runner: ubuntu-latest
          - language: javascript-typescript
            build-mode: none
            runner: ubuntu-latest
          - language: python
            build-mode: none
            runner: ubuntu-latest
          - language: rust
            build-mode: manual
            runner: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Install Rust toolchain
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        if: matrix.language == 'rust'
        uses: Swatinem/rust-cache@v2

      - name: Build Rust workspace
        if: matrix.language == 'rust'
        run: cargo build --workspace --locked

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
