name: Benchmark

on:
  push:
    branches: [main]
    paths:
      - 'crates/**/*.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [main]
    paths:
      - 'crates/**/*.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# `github-action-benchmark` posts alert comments on regressions.
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run benchmarks
        id: bench
        run: |
          set -o pipefail
          # Only criterion benches accept `--output-format bencher`. Run
          # each known criterion bench by name; libtest-harness benches
          # (e.g. nexis-ai lib `#[bench]` tests) reject the flag.
          : > benchmark-output.log
          BENCHES=(
            "-p nexis-doc --bench crdt_benchmark"
            "-p nexis-gateway --bench routing"
            "-p nexis-gateway --bench message_throughput"
            "-p nexis-gateway --bench websocket_connections"
            "-p nexis-meeting --bench sfu_benchmark"
          )
          for SPEC in "${BENCHES[@]}"; do
            echo "::group::cargo bench $SPEC"
            cargo bench $SPEC -- --output-format bencher 2>&1 \
              | tee -a benchmark-output.log || echo "::warning::bench '$SPEC' failed; continuing"
            echo "::endgroup::"
          done

          # Extract `test <name> ... bench: <ns/iter>` lines that
          # benchmark-action/github-action-benchmark (`tool: cargo`) consumes.
          grep -E '^test .* \.\.\. bench:' benchmark-output.log \
            > benchmark-results.txt || true

          if [ ! -s benchmark-results.txt ]; then
            echo "no_results=true" >> "$GITHUB_OUTPUT"
            echo "::notice::No bencher-formatted benchmark results produced; skipping result storage."
          else
            echo "no_results=false" >> "$GITHUB_OUTPUT"
            cat benchmark-results.txt
          fi

      - name: Store benchmark result
        if: steps.bench.outputs.no_results == 'false'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'cargo'
          output-file-path: benchmark-results.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          alert-threshold: '120%'
          comment-on-alert: true
          fail-on-alert: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.txt
          retention-days: 30
