name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Auto-cancel superseded runs on the same ref. Main-branch runs are not
# cancelled (their `group` is unique per SHA via `github.run_id`).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Minimum permissions for all jobs. Override per-job where extra scopes
# (e.g. `security-events: write`, `packages: write`) are needed.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

defaults:
  run:
    shell: bash

jobs:
  # ============================================================================
  # Rust Format Check
  # ============================================================================
  fmt:
    name: Rust Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
          cache: 'false'

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ============================================================================
  # Rust Clippy
  # ============================================================================
  clippy:
    name: Rust Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          components: clippy
          cache-key: clippy

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ============================================================================
  # Rust Build & Test
  # ============================================================================
  test:
    name: Rust Test
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: [fmt, clippy]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: test

      - name: Build
        run: cargo build --workspace --verbose

      - name: Run tests
        run: cargo test --workspace --verbose

  # ============================================================================
  # Rust Documentation
  # ============================================================================
  docs:
    name: Rust Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [fmt, clippy]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: docs

      - name: Build documentation
        run: cargo doc --workspace --no-deps

  # ============================================================================
  # Node Workspace Build & Test
  # ============================================================================
  node:
    name: Node Workspace
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Check Expo compatibility
        run: pnpm --filter @wisdoverse/nexus-mobile exec expo install --check

      - name: Typecheck mobile app
        run: pnpm --filter @wisdoverse/nexus-mobile typecheck

      - name: Test mobile app
        run: pnpm --filter @wisdoverse/nexus-mobile test

      - name: Build web app
        run: pnpm --filter @wisdoverse/nexus-web build

      - name: Build TypeScript SDK
        run: pnpm --filter @wisdoverse/nexus-sdk build

      - name: Build documentation site
        run: pnpm --dir docs docs:build

  # ============================================================================
  # Security Audit
  # ============================================================================
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache: 'false'

      - name: Install cargo-audit
        uses: taiki-e/install-action@f7ae479469b4c4fb5c1818615346605e61b5dc27  # cargo-audit

      - name: Run security audit
        run: cargo audit --deny warnings

  # ============================================================================
  # Test Coverage
  # ============================================================================
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          components: llvm-tools-preview
          cache-key: coverage

      - name: Install grcov
        uses: taiki-e/install-action@f7ae479469b4c4fb5c1818615346605e61b5dc27  # grcov

      - name: Run tests with coverage
        env:
          RUSTFLAGS: "-C instrument-coverage"
          LLVM_PROFILE_FILE: "coverage-%p-%m.profraw"
        run: cargo test --workspace

      - name: Generate coverage report
        run: |
          grcov . --binary-path ./target/debug/ -s . -t lcov --branch --ignore-not-existing --ignore "*cargo*" -o lcov.info

      - name: Enforce coverage threshold (60%+)
        run: |
          python - <<'PY'
          import json
          import re
          total = 0
          covered = 0
          with open("lcov.info", "r", encoding="utf-8") as f:
              for line in f:
                  if line.startswith("DA:"):
                      _, data = line.strip().split(":", 1)
                      lineno, hits = data.split(",", 1)
                      total += 1
                      if int(hits) > 0:
                          covered += 1
          if total == 0:
              raise SystemExit("No coverage lines found in lcov.info")
          ratio = covered / total * 100
          print(f"Line coverage: {ratio:.2f}% ({covered}/{total})")
          threshold = 60.0
          summary = {
              "line_coverage_percent": round(ratio, 2),
              "covered_lines": covered,
              "total_lines": total,
              "threshold_percent": threshold,
              "passed": ratio >= threshold,
          }
          with open("coverage-summary.json", "w", encoding="utf-8") as out:
              json.dump(summary, out, indent=2)
          if ratio < threshold:
              raise SystemExit(f"Coverage threshold not met: {ratio:.2f}% < {threshold:.2f}%")
          PY

      - name: Publish coverage summary
        run: |
          python - <<'PY'
          import json
          with open("coverage-summary.json", "r", encoding="utf-8") as f:
              data = json.load(f)
          line = (
              f"| {data['line_coverage_percent']:.2f}% | "
              f"{data['covered_lines']} / {data['total_lines']} | "
              f"{data['threshold_percent']:.2f}% |"
          )
          markdown = "\n".join(
              [
                  "## Coverage Report",
                  "",
                  "| Line Coverage | Covered / Total | Threshold |",
                  "| --- | --- | --- |",
                  line,
              ]
          )
          with open("coverage-summary.md", "w", encoding="utf-8") as out:
              out.write(markdown + "\n")
          print(markdown)
          PY
          cat coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage to Codecov
        # SHA-pinned per `actions/unpinned-tag` CodeQL recommendation.
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          files: lcov.info
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            lcov.info
            coverage-summary.json
            coverage-summary.md
          retention-days: 30

  # ============================================================================
  # Container Security Scan
  # ============================================================================
  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Build gateway image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: .
          file: docker/Dockerfile.gateway
          load: true
          tags: nexis-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: 'nexis-gateway:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # ============================================================================
  # License Check
  # ============================================================================
  license-check:
    name: License Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache: 'false'

      - name: Install cargo-deny
        uses: taiki-e/install-action@f7ae479469b4c4fb5c1818615346605e61b5dc27  # cargo-deny

      - name: Check dependency policy
        run: cargo deny check advisories bans licenses sources --hide-inclusion-graph
