name: Setup Node and pnpm
description: Install the repository Node/pnpm toolchain and optionally restore dependencies.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: '24'
  pnpm-version:
    description: pnpm version to install.
    required: false
    default: '10.30.3'
  install:
    description: Run pnpm install after toolchain setup.
    required: false
    default: 'true'
  registry-url:
    description: Optional npm registry URL for publish jobs.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v6
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Node.js
      if: inputs.registry-url == ''
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: Setup Node.js
      if: inputs.registry-url != ''
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml
        registry-url: ${{ inputs.registry-url }}

    - name: Install dependencies
      if: inputs.install == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile --ignore-scripts --prefer-offline
