# Dependabot configuration for automated dependency updates.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
#
# Conventions (org-wide standard):
# - Weekly cadence, Monday 06:00 Asia/Shanghai.
# - Security updates: ungrouped/grouped per ecosystem, bypass cooldown, immediate.
# - Version updates: grouped minor+patch, cooldown 3d patch / 7d minor, major ignored.
# - Conventional Commits prefixes (`chore`, `ci`, `fix`). Scope included.
# - Rebase strategy: auto. Branch separator: `-`.
# - Pull request limit per ecosystem: 5 (avoid PR flood; security updates have no cap).

version: 2

updates:
  # ---------------------------------------------------------------------------
  # Rust workspace crates (root Cargo.toml). Excludes `plugins/*` (handled below).
  # ---------------------------------------------------------------------------
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "rust"
    cooldown:
      default-days: 3
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      cargo-security:
        applies-to: security-updates
        patterns:
          - "*"
      cargo-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # Plugin crates (excluded from cargo workspace; built individually).
  # ---------------------------------------------------------------------------
  - package-ecosystem: "cargo"
    directories:
      - "/plugins/github"
      - "/plugins/jira"
      - "/plugins/poll"
      - "/plugins/translate"
      - "/plugins/welcome"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "rust"
      - "plugins"
    cooldown:
      default-days: 3
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      plugins-security:
        applies-to: security-updates
        patterns:
          - "*"
      plugins-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # GitHub Actions.
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    cooldown:
      default-days: 3
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"
      actions-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # ---------------------------------------------------------------------------
  # Root Dockerfile.
  # ---------------------------------------------------------------------------
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 3
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
    cooldown:
      default-days: 7
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      docker-root-security:
        applies-to: security-updates
        patterns:
          - "*"
      docker-root-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # docker/ stack Dockerfiles.
  # ---------------------------------------------------------------------------
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 3
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
    cooldown:
      default-days: 7
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      docker-stack-security:
        applies-to: security-updates
        patterns:
          - "*"
      docker-stack-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # Web app (Vite + React 19 + Tailwind 4).
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    versioning-strategy: "increase"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
      - "web"
    cooldown:
      default-days: 3
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      web-security:
        applies-to: security-updates
        patterns:
          - "*"
      web-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # Mobile app (Expo 55 + RN 0.83 + React 19).
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/apps/mobile"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    versioning-strategy: "increase"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
      - "mobile"
    cooldown:
      default-days: 5
      semver-minor-days: 14
      semver-patch-days: 5
    groups:
      mobile-security:
        applies-to: security-updates
        patterns:
          - "*"
      mobile-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # Expo SDK 55 bundles these at specific versions (bundledNativeModules.json).
      # Bumping them out-of-band breaks `expo install --check`. Pin until SDK 56.
      - dependency-name: "react-native"
      - dependency-name: "react"
      - dependency-name: "react-dom"
      - dependency-name: "react-native-safe-area-context"
      - dependency-name: "react-native-screens"

  # ---------------------------------------------------------------------------
  # TypeScript SDK (library — narrow version bumps).
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/sdk/typescript"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    versioning-strategy: "increase-if-necessary"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
      - "sdk"
    cooldown:
      default-days: 3
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      sdk-security:
        applies-to: security-updates
        patterns:
          - "*"
      sdk-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # Python SDK (pip).
  # ---------------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/sdk/python"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    versioning-strategy: "increase-if-necessary"
    insecure-external-code-execution: "deny"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "pip"
      - "sdk"
      - "python"
    cooldown:
      default-days: 3
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      sdk-python-security:
        applies-to: security-updates
        patterns:
          - "*"
      sdk-python-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # Documentation site (Astro/Vite).
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "weekly"
      day: "monday"
