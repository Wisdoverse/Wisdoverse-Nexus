      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 3
    rebase-strategy: "auto"
    versioning-strategy: "increase"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
      - "docs"
    cooldown:
      default-days: 5
      semver-minor-days: 7
      semver-patch-days: 5
    groups:
      docs-security:
        applies-to: security-updates
        patterns:
          - "*"
      docs-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # Web e2e (Playwright; dev-only).
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/apps/web/e2e"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 3
    rebase-strategy: "auto"
    versioning-strategy: "increase"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
      - "e2e"
    cooldown:
      default-days: 3
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      e2e-security:
        applies-to: security-updates
        patterns:
          - "*"
      e2e-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
