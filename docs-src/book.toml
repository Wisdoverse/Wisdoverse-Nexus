[book]
authors = ["Nexis Team"]
language = "en"
multilingual = false
src = "src"
title = "Nexis Docs"

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/gbrothersgroup/Nexis"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/gbrothersgroup/Nexis/edit/main/docs-src/{path}"
additional-css = [
  "theme/css/variables.css",
  "theme/css/general.css"
]
theme = "src/theme"
