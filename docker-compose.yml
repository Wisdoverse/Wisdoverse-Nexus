version: "3.8"

services:
  nexis-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    container_name: nexis-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - NEXIS_DEFAULT_PROVIDER=${NEXIS_DEFAULT_PROVIDER:-mock}
      - NEXIS_DATABASE_PATH=/app/data/nexis.db
      - JWT_SECRET=${JWT_SECRET:-}
    volumes:
      - nexis-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  nexis-data:
    driver: local
