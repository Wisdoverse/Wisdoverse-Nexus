# cargo-deny configuration (schema v2).
# https://embarkstudios.github.io/cargo-deny/checks/cfg.html

[graph]
all-features = true

# ---------------------------------------------------------------------------
# Licenses
# ---------------------------------------------------------------------------
[licenses]
version = 2
# Anything outside this allow-list fails the build.
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "LicenseRef-Wisdoverse-Nexus-BSL-1.1",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
confidence-threshold = 0.8

[licenses.private]
# Don't enforce licenses on first-party workspace crates.
ignore = true

# ---------------------------------------------------------------------------
# Bans (duplicate / wildcard versions)
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "warn"

# ---------------------------------------------------------------------------
# Sources
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "warn"
unknown-git = "warn"

# ---------------------------------------------------------------------------
# Security advisories (schema v2: severity lint levels removed,
# advisories not in `ignore` are now treated as `deny`).
# ---------------------------------------------------------------------------
[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"

ignore = [
    # rsa timing attack — only affects sqlx-mysql; we use postgres only.
    "RUSTSEC-2023-0071",
    # Unmaintained transitive deps (no fixed version available upstream).
    "RUSTSEC-2024-0436",  # paste — via tokenizers
    "RUSTSEC-2025-0119",  # number_prefix — via tokenizers
    "RUSTSEC-2025-0134",  # rustls-pemfile — via qdrant-client
]
